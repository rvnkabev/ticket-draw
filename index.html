
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Slot Draw Game</title>
<style>
html { font-size:250%; }
body{
  background:#111;color:white;font-family:sans-serif;
  text-align:center;padding:30px;
}
.hidden{display:none}
button{
  font-size:1rem;padding:.5em 1em;margin:.5em;
  background:#444;color:white;border:none;border-radius:.3em;cursor:pointer;
}
button:hover{background:gold;color:black}
.import-box{position:fixed;bottom:5px;right:10px;opacity:.3;font-size:.4em}
.import-box input{width:2em;font-size:.4em}
.reel{
  width:2.8em;height:2.8em;font-size:1.5em;background:#222;
  line-height:2.8em;border-radius:.3em;border:.08em solid #666;
}
.reels{display:flex;justify-content:center;gap:.4em;overflow-x:auto;margin-top:1em}
.lever{
  width:.8em;height:3em;background:linear-gradient(to bottom,silver,gray);
  border-radius:.3em;position:relative;cursor:pointer;transition:.3s;margin-left:1em;
}
.lever-ball{
  position:absolute;bottom:-.9em;left:50%;transform:translateX(-50%);
  width:1.4em;height:1.4em;background:red;border-radius:50%;border:.15em solid #fff;
}
.lever.down{transform:rotate(30deg)}
.slot-flex{display:flex;justify-content:center;align-items:center;gap:1em}
.success-btn{background:#25d0a6;color:white}
.reward-card{
  background:#fff;color:#111;border:1px solid #ddd;border-radius:14px;
  padding:14px;margin:10px auto;max-width:680px;
}
.reward-actions button{font-size:70%;padding:.3em .7em}
.primary{background:#7aa2ff;color:#fff}
.danger{background:#ff7777;color:#fff}
input{font-size:90%;padding:.5em;margin:.5em;width:80%}
.small{font-size:70%}
</style>
</head>

<body>

<div id="menu">
  <h1>Slot Draw</h1>
  <p>You have <strong id="homeTickets">0</strong> ticket(s)</p>
  <button onclick="showSection('single')">Single Draw</button>
  <button onclick="showThreeStage()">Three Draw</button>
  <button onclick="showFiveStage()">Five Draw</button>
  <button onclick="showSixStage()">Six Draw</button>
  <button onclick="showSection('redeem')">Redeem</button>
</div>

<div class="import-box">
  Import: <input id="importInput" type="number" />
  <button onclick="addImportedTickets()">Add</button>
</div>

<div id="single" class="hidden">
  <h2>Single Draw</h2>
  <div class="slot-flex">
    <div class="reel" id="singleReel">💎</div>
    <div class="lever" id="lever" onclick="pullSingle()"><div class="lever-ball"></div></div>
  </div>
  <div id="singleResult"></div>
  <button onclick="showSection('menu')">Back</button>
</div>

<div id="threeStage" class="hidden">
  <h2>Three Draw</h2>
  <div class="reels">
    <div class="reel" id="ts0">💎</div><div class="reel" id="ts1">💎</div><div class="reel" id="ts2">💎</div>
  </div>
  <div id="threeStageResult"></div>
  <div id="pomodoroReviewResult" style="color:#25d0a6;"></div>
  <button class="success-btn" onclick="logPomodoroReview()">Pomodoro - review</button>
  <button onclick="returnToMenu()">Back</button>
</div>

<div id="fiveStage" class="hidden">
  <h2>Five Draw</h2>
  <div class="reels">
    <div class="reel" id="fs0">💎</div><div class="reel" id="fs1">💎</div><div class="reel" id="fs2">💎</div><div class="reel" id="fs3">💎</div><div class="reel" id="fs4">💎</div>
  </div>
  <div id="fiveStageResult"></div>
  <button onclick="returnToMenu()">Back</button>
</div>

<div id="sixStage" class="hidden">
  <h2>Six Draw</h2>
  <div class="reels">
    <div class="reel" id="ss0">💎</div><div class="reel" id="ss1">💎</div><div class="reel" id="ss2">💎</div><div class="reel" id="ss3">💎</div><div class="reel" id="ss4">💎</div><div class="reel" id="ss5">💎</div>
  </div>
  <div id="sixStageResult"></div>
  <button onclick="returnToMenu()">Back</button>
</div>

<div id="redeem" class="hidden">
  <h2>Redeem</h2>
  <p>You have <strong id="ticketCount">0</strong> ticket(s)</p>
  <button onclick="redeem(1)">Small (-1)</button>
  <button onclick="redeem(5)">-5</button>
  <button onclick="redeem(20)">Medium (-20)</button>
  <button onclick="redeem(60)">-60</button>
  <button onclick="redeem(100)">Big (-100)</button>
  <button onclick="customRedeem()">Custom</button>
  <br>
  <button class="success-btn" onclick="gotoReward()">Reward Page</button>
  <div id="redeemResult"></div>
  <button onclick="showSection('menu')">Back</button>
</div>

<div id="rewardPage" class="hidden">
  <h2>Reward</h2>

  <div class="reward-card">
    <div class="small">Add / Edit Reward</div>
    <input id="rewardName" type="text" placeholder="Reward item，例如：美女 video / coffee / game" />
    <input id="rewardStars" type="number" placeholder="Star number，例如：5 / 10 / 60" />
    <button class="primary" onclick="saveCustomReward()">Save Reward</button>
    <button onclick="clearRewardForm()">Clear</button>
  </div>

  <div id="rewardList"></div>

  <button onclick="showSection('redeem')">Back to Redeem</button>
  <button onclick="showSection('menu')">Home</button>
</div>

<script>
let tickets = parseInt(localStorage.getItem("tickets") || "0");
let editingRewardId = null;

const symbols = ["🍋","🍒","🍇","🍉","🔔","⭐","💎"];
const symbolToTickets = {"🍋":0,"🍒":1,"🍇":1,"🍉":2,"🔔":2,"⭐":3,"💎":3};

const STORAGE_KEY = "successDiaryRewards_v1";

const defaultRewards = [
  { id:"default_1", name:"抱石美女", stars:"60", text:"享受 #抱石美女 60**", locked:true },
  { id:"default_2", name:"打機老婆（30mins)", stars:"5", text:"打機 #wife 5**", locked:true },
  { id:"default_3", name:"Beer", stars:"10", text:"飲啤酒 10**", locked:true }
];

function updateAllDisplays(){
  document.getElementById("homeTickets").innerText = tickets;
  document.getElementById("ticketCount").innerText = tickets;
}

function showSection(id){
  ["menu","single","threeStage","fiveStage","sixStage","redeem","rewardPage"].forEach(sec=>{
    document.getElementById(sec).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
  updateAllDisplays();
}

function returnToMenu(){ showSection("menu"); }

function addImportedTickets(){
  const val = parseInt(document.getElementById("importInput").value);
  if(!isNaN(val) && val > 0){
    tickets += val;
    localStorage.setItem("tickets", tickets);
    updateAllDisplays();
    document.getElementById("importInput").value = "";
  }
}

function pullSingle(){
  const reel = document.getElementById("singleReel");
  const lever = document.getElementById("lever");
  const result = document.getElementById("singleResult");
  result.innerHTML = "";
  lever.classList.add("down");
  setTimeout(()=>lever.classList.remove("down"),300);

  let count = 0;
  const interval = setInterval(()=>{
    reel.innerText = symbols[Math.floor(Math.random()*symbols.length)];
    if(++count >= 20){
      clearInterval(interval);
      const finalSymbol = symbols[Math.floor(Math.random()*symbols.length)];
      reel.innerText = finalSymbol;
      const gain = symbolToTickets[finalSymbol];
      tickets += gain;
      localStorage.setItem("tickets", tickets);
      result.innerHTML = `You got <strong>${gain}</strong> ticket(s) with ${finalSymbol}`;
      updateAllDisplays();
    }
  },100);
}

function multiDraw(stageId, reelPrefix, draws){
  showSection(stageId);
  const reels = [...Array(draws)].map((_,i)=>document.getElementById(reelPrefix+i));
  const resultBox = document.getElementById(stageId+"Result");
  resultBox.innerHTML = "Starting draw...";
  let total = 0;

  function spinOne(index){
    if(index >= draws){
      localStorage.setItem("tickets", tickets);
      resultBox.innerHTML += `<br><strong>Total: ${total} ticket(s)!</strong>`;
      updateAllDisplays();
      return;
    }

    let cnt = 0;
    const spin = setInterval(()=>{
      reels[index].innerText = symbols[Math.floor(Math.random()*symbols.length)];
      if(++cnt >= 20){
        clearInterval(spin);
        const final = symbols[Math.floor(Math.random()*symbols.length)];
        reels[index].innerText = final;
        const gain = symbolToTickets[final];
        tickets += gain;
        total += gain;
        resultBox.innerHTML += `<br>Draw ${index+1}: ${final} → +${gain}`;
        setTimeout(()=>spinOne(index+1),500);
      }
    },50);
  }

  spinOne(0);
}

function showThreeStage(){ multiDraw("threeStage","ts",3); }
function showFiveStage(){ multiDraw("fiveStage","fs",5); }
function showSixStage(){ multiDraw("sixStage","ss",6); }

function redeem(amount){
  const msg = document.getElementById("redeemResult");
  if(tickets >= amount){
    tickets -= amount;
    localStorage.setItem("tickets", tickets);
    msg.innerHTML = `Redeemed ${amount} ticket(s)!`;
  }else{
    msg.innerHTML = `Not enough tickets.`;
  }
  updateAllDisplays();
}

function customRedeem(){
  let v = parseInt(prompt("How many tickets to redeem?"));
  if(!isNaN(v) && v > 0) redeem(v);
}

function fmtTime(){
  const d = new Date();
  let h = d.getHours();
  let m = d.getMinutes().toString().padStart(2,"0");
  const am = h >= 12 ? "pm" : "am";
  h = h % 12 || 12;
  return `${h}:${m}${am}`;
}

function fmtDate(){
  const now = new Date();
  return new Date(now.getTime() - now.getTimezoneOffset()*60000)
    .toISOString().split("T")[0];
}

function buildSuccessDailyEntry(text, tags){
  const tagPart = tags ? ` ${tags}` : "";
  return `[${fmtDate()}\n${fmtTime()} ｜ ${text}${tagPart}]`;
}

function sendToShortcuts(encodedText){
  const url = `shortcuts://run-shortcut?name=${encodeURIComponent("SaveToSuccessDaily")}&input=text&text=${encodedText}`;
  window.open(url);
}

function logPomodoroReview(){
  const note = buildSuccessDailyEntry("25mins", "#pomodoro #review");
  sendToShortcuts(encodeURIComponent(note));
  document.getElementById("pomodoroReviewResult").innerHTML = "Saved Pomodoro review to SuccessDaily.";
}

/* Reward Page */

function gotoReward(){
  showSection("rewardPage");
  renderRewards();
}

function getCustomRewards(){
  const saved = localStorage.getItem(STORAGE_KEY);
  try { return saved ? JSON.parse(saved) : []; }
  catch(e){ return []; }
}

function saveRewards(customRewards){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(customRewards));
}

function loadRewards(){
  return [...defaultRewards, ...getCustomRewards()];
}

function renderRewards(){
  const list = document.getElementById("rewardList");
  list.innerHTML = "";

  loadRewards().forEach(r=>{
    const div = document.createElement("div");
    div.className = "reward-card";
    div.innerHTML = `
      <div><strong>${escapeHTML(r.name)}</strong></div>
      <div class="small">${escapeHTML(r.stars)} **</div>
      <div class="reward-actions">
        <button class="primary" onclick="logReward('${r.id}')">Log</button>
        ${r.locked ? "" : `
          <button onclick="editReward('${r.id}')">Edit</button>
          <button class="danger" onclick="deleteReward('${r.id}')">Delete</button>
        `}
      </div>
    `;
    list.appendChild(div);
  });
}

function saveCustomReward(){
  const name = document.getElementById("rewardName").value.trim();
  const stars = document.getElementById("rewardStars").value.trim();

  if(!name){ alert("Please enter reward item"); return; }
  if(!stars || isNaN(Number(stars))){ alert("Please enter star number"); return; }

  let custom = getCustomRewards();

  if(editingRewardId){
    custom = custom.map(r => r.id === editingRewardId
      ? { ...r, name, stars, text:`${name} ${stars}**` }
      : r
    );
  }else{
    custom.push({
      id:"custom_" + Date.now(),
      name,
      stars,
      text:`${name} ${stars}**`,
      locked:false
    });
  }

  saveRewards(custom);
  clearRewardForm();
  renderRewards();
}

function editReward(id){
  const r = getCustomRewards().find(x=>x.id===id);
  if(!r) return;
  editingRewardId = id;
  document.getElementById("rewardName").value = r.name;
  document.getElementById("rewardStars").value = r.stars;
}

function deleteReward(id){
  if(!confirm("Delete this reward?")) return;
  const custom = getCustomRewards().filter(r=>r.id!==id);
  saveRewards(custom);
  clearRewardForm();
  renderRewards();
}

function clearRewardForm(){
  editingRewardId = null;
  document.getElementById("rewardName").value = "";
  document.getElementById("rewardStars").value = "";
}

function logReward(id){
  const reward = loadRewards().find(r=>r.id===id);
  if(!reward) return;
  const note = buildSuccessDailyEntry(reward.text, "");
  sendToShortcuts(encodeURIComponent(note));
  showSection("redeem");
}

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

function handleUrlRedeem(){
  const params = new URLSearchParams(window.location.search);
  let redeemParam = params.get("redeem");
  if(!redeemParam) return;

  redeemParam = redeemParam.toString().trim().toLowerCase();
  let amt = 0;

  if(redeemParam === "small") amt = 1;
  else if(redeemParam === "medium") amt = 20;
  else if(redeemParam === "big") amt = 100;
  else amt = parseInt(redeemParam, 10);

  if(isNaN(amt) || amt <= 0) return;

  showSection("redeem");
  redeem(amt);
}

updateAllDisplays();
handleUrlRedeem();
</script>

</body>
</html>
